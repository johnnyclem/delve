openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: D&D Campaign Manager API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: campaign
    description: Campaign operations
  - name: members
    description: Campaign member operations
  - name: characters
    description: Character sheet operations
  - name: sessions
    description: Session log operations
  - name: calendar
    description: Session scheduling and RSVPs
  - name: dice
    description: Dice rolling
  - name: recap
    description: AI recap generation
  - name: dashboard
    description: Dashboard summary
  - name: maps
    description: Battle maps with server-enforced fog of war
  - name: rules
    description: SRD reference lookup
  - name: entities
    description: Campaign wiki entities (NPCs, quests, locations, etc.) with reveal gating
  - name: chat
    description: AI chat with hybrid retrieval over SRD rules and campaign lore
  - name: Storage
    description: Object storage upload and serving endpoints.

paths:
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset from PUBLIC_OBJECT_SEARCH_PATHS
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed with correct Content-Type.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: File not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed with correct Content-Type.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /rules/search:
    get:
      operationId: searchRules
      tags: [rules]
      summary: Full-text search the SRD reference content
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 1
        - name: edition
          in: query
          required: false
          schema:
            type: string
            enum: ["2014", "2024"]
        - name: kind
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        "200":
          description: Matching reference chunks ordered by relevance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleSearchResponse"
        "400":
          description: Missing or invalid query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rules/{kind}/{slug}:
    get:
      operationId: getRule
      tags: [rules]
      summary: Look up a single SRD reference entity by kind and slug
      parameters:
        - name: kind
          in: path
          required: true
          schema:
            type: string
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: edition
          in: query
          required: false
          schema:
            type: string
            enum: ["2014", "2024"]
      responses:
        "200":
          description: Reference entity (one or more chunks)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleEntity"
        "404":
          description: No matching entity in this edition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /campaign:
    get:
      operationId: getCampaign
      tags: [campaign]
      summary: Get current campaign
      responses:
        "200":
          description: Campaign details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
    patch:
      operationId: updateCampaign
      tags: [campaign]
      summary: Update campaign settings (DM only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCampaignBody"
      responses:
        "200":
          description: Updated campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /campaign/dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Dashboard summary (next session, party roster, latest recap)
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /members:
    get:
      operationId: listMembers
      tags: [members]
      summary: List campaign members
      responses:
        "200":
          description: List of members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CampaignMember"

  /members/me:
    get:
      operationId: getMyMembership
      tags: [members]
      summary: Get the current user's membership and role
      responses:
        "200":
          description: Current user membership
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignMember"
        "404":
          description: Not a member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /members/me/notifications:
    patch:
      operationId: updateNotificationPrefs
      tags: [members]
      summary: Update email notification preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNotificationPrefsBody"
      responses:
        "200":
          description: Updated member with new preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignMember"

  /characters:
    get:
      operationId: listCharacters
      tags: [characters]
      summary: List all active characters in the campaign
      responses:
        "200":
          description: List of characters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Character"
    post:
      operationId: createCharacter
      tags: [characters]
      summary: Create a new character
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCharacterBody"
      responses:
        "201":
          description: Created character
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Character"

  /characters/speakable:
    get:
      operationId: listSpeakableCharacters
      tags: [characters]
      summary: List characters the current user can "speak as" in chat (own active characters; DM gets all)
      responses:
        "200":
          description: Speakable characters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SpeakableCharacter"

  /characters/{id}:
    get:
      operationId: getCharacter
      tags: [characters]
      summary: Get a character by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Character details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Character"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateCharacter
      tags: [characters]
      summary: Update a character sheet
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCharacterBody"
      responses:
        "200":
          description: Updated character
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Character"

  /npcs:
    get:
      operationId: listNpcs
      tags: [npcs]
      summary: List all NPCs in the campaign roster
      responses:
        "200":
          description: List of NPCs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Npc"
    post:
      operationId: createNpc
      tags: [npcs]
      summary: Create a new NPC in the campaign roster (DM only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNpcBody"
      responses:
        "201":
          description: Created NPC
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Npc"

  /npcs/{id}:
    delete:
      operationId: deleteNpc
      tags: [npcs]
      summary: Delete an NPC from the campaign roster (DM only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deletion result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /sessions:
    get:
      operationId: listSessions
      tags: [sessions]
      summary: List all session logs
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SessionLog"
    post:
      operationId: createSession
      tags: [sessions]
      summary: Create a new session log (DM only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionBody"
      responses:
        "201":
          description: Created session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionLog"

  /sessions/{id}:
    get:
      operationId: getSession
      tags: [sessions]
      summary: Get a session log by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionLog"
    patch:
      operationId: updateSession
      tags: [sessions]
      summary: Update a session log (DM only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSessionBody"
      responses:
        "200":
          description: Updated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionLog"
        "409":
          description: Conflict – the session was modified by another client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConflictError"

  /sessions/{id}/generate-recap:
    post:
      operationId: generateRecap
      tags: [recap]
      summary: Generate a narrative recap from session notes (DM only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Generated recap text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedRecap"

  /sessions/{id}/notify-recap:
    post:
      operationId: notifyRecap
      tags: [recap]
      summary: Send recap notification emails to players (DM only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Notifications dispatched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotifyRecapResult"

  /sessions/{id}/notifications:
    get:
      operationId: listSessionNotifications
      tags: [sessions]
      summary: List recap notification delivery logs for a session (DM only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Notification delivery logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NotificationLog"
        "403":
          description: Only the DM can view notification logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{id}/notifications/{logId}/resend:
    post:
      operationId: resendNotification
      tags: [recap]
      summary: Resend a single failed recap notification (DM only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: logId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Resend attempted; returns the new notification log row
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResendNotificationResult"
        "403":
          description: Only the DM can resend notifications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Session or notification log not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{id}/notifications/resend-failed:
    post:
      operationId: resendFailedNotifications
      tags: [recap]
      summary: Resend all currently-failed recap notifications for a session (DM only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Resend attempted for failed entries; returns the new notification log rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResendFailedResult"
        "403":
          description: Only the DM can resend notifications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{id}/mark-recap-viewed:
    post:
      operationId: markRecapViewed
      tags: [sessions]
      summary: Mark a session recap as viewed by the current player
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Recap marked as viewed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /sessions/latest-recap:
    get:
      operationId: getLatestRecap
      tags: [sessions]
      summary: Get the latest published recap
      responses:
        "200":
          description: Latest recap
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionLog"
        "404":
          description: No recaps found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /calendar:
    get:
      operationId: listEvents
      tags: [calendar]
      summary: List scheduled/proposed sessions
      responses:
        "200":
          description: List of calendar events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalendarEvent"
    post:
      operationId: createEvent
      tags: [calendar]
      summary: Create a new session event (DM only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventBody"
      responses:
        "201":
          description: Created event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"

  /calendar/{id}:
    get:
      operationId: getEvent
      tags: [calendar]
      summary: Get a calendar event with RSVPs
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Event with RSVPs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEventWithRsvps"
    patch:
      operationId: updateEvent
      tags: [calendar]
      summary: Update a calendar event (DM only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEventBody"
      responses:
        "200":
          description: Updated event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"
    delete:
      operationId: deleteEvent
      tags: [calendar]
      summary: Delete an event (DM only). Pass series=true to delete the entire recurring series.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: series
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: Deletion result
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: integer
                required:
                  - deleted

  /calendar/{id}/notifications:
    get:
      operationId: getEventInviteLogs
      tags: [calendar]
      summary: Get event invite delivery logs (DM only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of invite delivery records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EventInviteLog"

  /calendar/{id}/notifications/{logId}/resend:
    post:
      operationId: resendEventInvite
      tags: [calendar]
      summary: Resend a single event invite to one recipient (DM only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: logId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Resend attempted; returns the new invite delivery row
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResendEventInviteResult"
        "403":
          description: Only the DM can resend invites
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Event or invite log not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /calendar/{id}/resend-invites:
    post:
      operationId: resendEventInvites
      tags: [calendar]
      summary: Resend event invite emails to all opted-in players (DM only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Resend dispatched; returns the new invite delivery rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResendEventInvitesResult"
        "403":
          description: Only the DM can resend invites
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Event not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /calendar/series/{seriesId}/reanchor:
    post:
      operationId: reanchorSeries
      tags: [calendar]
      summary: Re-anchor a recurring series to the campaign timezone (DM only)
      parameters:
        - name: seriesId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Re-anchor result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReanchorSeriesResult"
        "403":
          description: Only the DM can re-anchor a series
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Series not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /calendar/{eventId}/rsvp:
    put:
      operationId: upsertRsvp
      tags: [calendar]
      summary: Set or update RSVP for an event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertRsvpBody"
      responses:
        "200":
          description: RSVP saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rsvp"

  /dice/roll:
    post:
      operationId: rollDice
      tags: [dice]
      summary: Roll dice and log the result
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RollDiceBody"
      responses:
        "201":
          description: Dice roll result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiceRoll"

  /maps:
    get:
      operationId: listMaps
      tags: [maps]
      summary: List all maps in the campaign
      responses:
        "200":
          description: Map summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MapSummary"
    post:
      operationId: createMap
      tags: [maps]
      summary: Create a new map (DM only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMapBody"
      responses:
        "201":
          description: Map created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Map"
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Only the DM can create maps
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /maps/{id}:
    get:
      operationId: getMap
      tags: [maps]
      summary: Get a single map (fog-filtered for non-DMs)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Map (with unrevealed tile types nulled for non-DMs)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Map"
        "404":
          description: Map not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateMap
      tags: [maps]
      summary: Update a map's name, tiles, or tokens (DM only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMapBody"
      responses:
        "200":
          description: Updated map
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Map"
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Only the DM can edit maps
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Map not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: Patch body too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteMap
      tags: [maps]
      summary: Delete a map (DM only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Map deleted
        "403":
          description: Only the DM can delete maps
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Map not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dice/recent:
    get:
      operationId: getRecentRolls
      tags: [dice]
      summary: Get the 20 most recent dice rolls
      responses:
        "200":
          description: Recent rolls
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DiceRoll"

  /entities:
    get:
      operationId: listEntities
      tags: [entities]
      summary: List campaign wiki entities. Players only see revealed entities and never see secret fields.
      parameters:
        - name: kind
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EntityKind"
      responses:
        "200":
          description: List of entities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CampaignEntity"
    post:
      operationId: createEntity
      tags: [entities]
      summary: Create a new campaign entity (DM only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEntityBody"
      responses:
        "201":
          description: Created entity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignEntity"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /entities/{id}:
    get:
      operationId: getEntity
      tags: [entities]
      summary: Get a single entity. Hidden entities return 404 to non-DMs.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Entity details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignEntity"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateEntity
      tags: [entities]
      summary: Update an entity (DM only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEntityBody"
      responses:
        "200":
          description: Updated entity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignEntity"
    delete:
      operationId: deleteEntity
      tags: [entities]
      summary: Delete an entity (DM only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deletion result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /entities/{id}/reveal:
    post:
      operationId: revealEntity
      tags: [entities]
      summary: Reveal an entity to players (DM only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated entity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignEntity"

  /entities/{id}/unreveal:
    post:
      operationId: unrevealEntity
      tags: [entities]
      summary: Hide a previously revealed entity (DM only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated entity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignEntity"

  /entities/seed-srd:
    post:
      operationId: seedWorldFromSrd
      tags: [entities]
      summary: Seed (or top-up) this campaign's world with starter NPCs and mob encounters drawn from the SRD bestiary (DM only). Idempotent — entries that already exist are left untouched.
      responses:
        "200":
          description: Seed summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeedWorldSummary"
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: SRD bestiary not ingested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /entities/{id}/audit:
    get:
      operationId: getEntityAudit
      tags: [entities]
      summary: Audit timeline of reveal/edit actions for an entity (DM only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Audit entries (newest first)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EntityAuditEntry"

  /homebrew:
    get:
      operationId: listHomebrewRules
      tags: [homebrew]
      summary: List house rules for the campaign. Players see only active rules.
      responses:
        "200":
          description: House rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HomebrewRule"
    post:
      operationId: createHomebrewRule
      tags: [homebrew]
      summary: Create a house rule (DM only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHomebrewRuleBody"
      responses:
        "201":
          description: Created house rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HomebrewRule"
        "403":
          description: Only the DM can create house rules
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /homebrew/{id}:
    get:
      operationId: getHomebrewRule
      tags: [homebrew]
      summary: Get a single house rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: House rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HomebrewRule"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateHomebrewRule
      tags: [homebrew]
      summary: Update a house rule (DM only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateHomebrewRuleBody"
      responses:
        "200":
          description: Updated house rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HomebrewRule"
    delete:
      operationId: deleteHomebrewRule
      tags: [homebrew]
      summary: Soft-delete a house rule by setting active=false (DM only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deletion result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /homebrew/share-token:
    get:
      operationId: getHouseRulesShareToken
      tags: [homebrew]
      summary: Get the campaign's existing public share token for house rules (DM only). Returns null token if none has been generated.
      responses:
        "200":
          description: Current share token (may be null)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HouseRulesShareToken"
    post:
      operationId: createHouseRulesShareToken
      tags: [homebrew]
      summary: Create or rotate the campaign's public share token for house rules (DM only)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                rotate:
                  type: boolean
                  description: When true, replace any existing token with a freshly generated one.
      responses:
        "200":
          description: Active share token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HouseRulesShareToken"
        "403":
          description: Only the DM can manage the share token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /public/house-rules/{token}:
    get:
      operationId: getPublicHouseRules
      tags: [homebrew]
      summary: Public, read-only view of a campaign's active house rules. Requires no authentication.
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Active house rules for the campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicHouseRulesView"
        "404":
          description: Unknown share token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chat:
    post:
      operationId: postChat
      tags: [chat]
      summary: Ask the AI assistant a question with hybrid retrieval over SRD + campaign lore
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: Chat answer with citations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: LLM service temporarily unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chat/threads:
    get:
      operationId: listChatThreads
      tags: [chat]
      summary: List the current user's chat conversations for this campaign (most recent first)
      responses:
        "200":
          description: Chat threads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatThread"

  /chat/threads/{id}:
    get:
      operationId: getChatThread
      tags: [chat]
      summary: Get one chat thread along with its messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Thread + ordered messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatThreadDetail"
        "404":
          description: Thread not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateChatThread
      tags: [chat]
      summary: Rename one of the current user's chat threads
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateChatThreadBody"
      responses:
        "200":
          description: Updated thread
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatThread"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Thread not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteChatThread
      tags: [chat]
      summary: Delete one of the current user's chat threads
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deletion result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Thread not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Campaign:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        worldName:
          type: ["string", "null"]
        dmUserId:
          type: string
        timezone:
          type: string
          description: IANA time-zone identifier (e.g. "America/New_York"). Defaults to "UTC".
        homebrewRules:
          $ref: "#/components/schemas/CampaignHomebrewRules"
        defaultEdition:
          type: string
          enum: ["2014", "2024"]
          description: Default SRD edition used by rules lookup and AI features.
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - dmUserId
        - timezone
        - homebrewRules
        - defaultEdition
        - createdAt

    CampaignHomebrewRules:
      type: object
      description: |
        DM-managed overrides for standard 5e mechanics. Empty object means the
        campaign uses standard 5e rules.
      properties:
        disableProficiencyAutoProgression:
          type: boolean
          description: |
            When true, changing a character's level does not auto-recalculate
            their proficiency bonus.
        proficiencyBonusByLevel:
          type: array
          minItems: 20
          maxItems: 20
          items:
            type: integer
            minimum: 1
          description: |
            Custom 20-entry proficiency-bonus-by-level table. Index `level - 1`
            yields the bonus for that level. When omitted, the standard 5e
            formula is used.

    UpdateCampaignBody:
      type: object
      properties:
        timezone:
          type: string
          description: IANA time-zone identifier (e.g. "America/Los_Angeles").
        homebrewRules:
          $ref: "#/components/schemas/CampaignHomebrewRules"
        defaultEdition:
          type: string
          enum: ["2014", "2024"]
          description: Default SRD edition for rules lookup and AI features.

    CampaignMember:
      type: object
      properties:
        id:
          type: integer
        campaignId:
          type: integer
        userId:
          type: string
        role:
          type: string
          enum: [dm, player]
        displayName:
          type: string
        avatarUrl:
          type: ["string", "null"]
        emailNotifications:
          type: boolean
        timezone:
          type: ["string", "null"]
          description: IANA timezone identifier the recipient prefers for invite emails. Falls back to the campaign timezone when null.
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - campaignId
        - userId
        - role
        - displayName
        - emailNotifications
        - createdAt

    CharacterSheet:
      type: object
      properties:
        strength:
          type: integer
        dexterity:
          type: integer
        constitution:
          type: integer
        intelligence:
          type: integer
        wisdom:
          type: integer
        charisma:
          type: integer
        maxHp:
          type: integer
        currentHp:
          type: integer
        armorClass:
          type: integer
        speed:
          type: integer
        proficiencyBonus:
          type: integer
        attacks:
          type: array
          items:
            $ref: "#/components/schemas/Attack"
        savingThrows:
          type: array
          items:
            type: string
        skills:
          type: array
          items:
            type: string
        spells:
          type: array
          items:
            $ref: "#/components/schemas/Spell"
        cantrips:
          type: array
          items:
            type: string
        spellSlots:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/SpellSlotLevel"
        inventory:
          type: array
          items:
            type: string
        feats:
          type: array
          items:
            type: string
        notes:
          type: string
        background:
          type: string
          description: Optional 5e SRD background label (e.g. "Soldier", "Acolyte"). Not required for back-compat with characters created before backgrounds were tracked.
        asiHistory:
          type: array
          items:
            $ref: "#/components/schemas/AsiHistoryEntry"
        levelHistory:
          type: array
          items:
            $ref: "#/components/schemas/LevelHistoryEntry"
      required:
        - strength
        - dexterity
        - constitution
        - intelligence
        - wisdom
        - charisma
        - maxHp
        - currentHp
        - armorClass
        - speed
        - proficiencyBonus

    Attack:
      type: object
      properties:
        name:
          type: string
        bonus:
          type: integer
        damage:
          type: string
      required:
        - name
        - bonus
        - damage

    AsiHistoryEntry:
      type: object
      description: A record of an ability score boost taken at a specific level.
      properties:
        level:
          type: integer
          description: The character level at which the boost was applied.
        ability:
          type: string
          enum:
            - strength
            - dexterity
            - constitution
            - intelligence
            - wisdom
            - charisma
        delta:
          type: integer
          description: The amount the ability score was boosted by (e.g. 1 or 2).
      required:
        - level
        - ability
        - delta

    LevelHistoryEntry:
      type: object
      description: A record of what was gained when the character reached this level.
      properties:
        level:
          type: integer
          description: The character level reached.
        hpGained:
          type: integer
          description: Total HP added at this level (after CON modifier, minimum 1).
        hpMethod:
          type: string
          enum:
            - roll
            - average
            - manual
        hpRoll:
          type: integer
          description: Raw hit-die value rolled before applying CON, when hpMethod is "roll".
        asiBoosts:
          type: array
          description: Ability score increases applied at this level.
          items:
            type: object
            properties:
              ability:
                type: string
                enum:
                  - strength
                  - dexterity
                  - constitution
                  - intelligence
                  - wisdom
                  - charisma
              delta:
                type: integer
            required:
              - ability
              - delta
        featNote:
          type: string
          description: Description of the feat taken at this level, if any.
        featuresLearned:
          type: array
          description: Class features unlocked at this level.
          items:
            type: string
      required:
        - level
        - hpGained

    Spell:
      type: object
      properties:
        name:
          type: string
        level:
          type: integer
        prepared:
          type: boolean
      required:
        - name
        - level

    SpellSlotLevel:
      type: object
      properties:
        total:
          type: integer
        used:
          type: integer
      required:
        - total
        - used

    Character:
      type: object
      properties:
        id:
          type: integer
        campaignId:
          type: integer
        ownerUserId:
          type: string
        ownerDisplayName:
          type: string
        name:
          type: string
        race:
          type: string
        class:
          type: string
        level:
          type: integer
        sheetJson:
          $ref: "#/components/schemas/CharacterSheet"
        portraitUrl:
          type: ["string", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - campaignId
        - ownerUserId
        - name
        - race
        - class
        - level
        - sheetJson
        - isActive
        - createdAt
        - updatedAt

    UpdateCharacterBody:
      type: object
      properties:
        name:
          type: string
        race:
          type: string
        class:
          type: string
        level:
          type: integer
        sheetJson:
          $ref: "#/components/schemas/CharacterSheet"
        portraitUrl:
          type: ["string", "null"]

    CreateCharacterBody:
      type: object
      properties:
        name:
          type: string
        race:
          type: string
        class:
          type: string
        level:
          type: integer
          default: 1
        sheetJson:
          $ref: "#/components/schemas/CharacterSheet"
        portraitUrl:
          type: ["string", "null"]
      required:
        - name
        - race
        - class

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    Npc:
      type: object
      properties:
        id:
          type: integer
        campaignId:
          type: integer
        name:
          type: string
        shortNote:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        createdByUserId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - campaignId
        - name
        - createdByUserId
        - createdAt
        - updatedAt

    CreateNpcBody:
      type: object
      properties:
        name:
          type: string
        shortNote:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
      required:
        - name

    SessionAttendees:
      type: object
      properties:
        characterIds:
          type: array
          items:
            type: integer
        npcs:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              npcId:
                type: integer
            required:
              - name
      required:
        - characterIds
        - npcs

    SessionLog:
      type: object
      properties:
        id:
          type: integer
        campaignId:
          type: integer
        sessionNumber:
          type: integer
        title:
          type: string
        playedAt:
          type: ["string", "null"]
          format: date-time
        rawNotesMd:
          type: ["string", "null"]
        recapMd:
          type: ["string", "null"]
        generatedAt:
          type: ["string", "null"]
          format: date-time
        notifiedAt:
          type: ["string", "null"]
          format: date-time
        attendees:
          oneOf:
            - $ref: "#/components/schemas/SessionAttendees"
            - type: "null"
        hasNewRecap:
          type: boolean
        recapWordCount:
          type: integer
          description: Word count of the recap text, or 0 if no recap exists.
        version:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - campaignId
        - sessionNumber
        - title
        - version
        - createdAt
        - updatedAt

    CreateSessionBody:
      type: object
      properties:
        sessionNumber:
          type: integer
        title:
          type: string
        playedAt:
          type: ["string", "null"]
          format: date-time
        rawNotesMd:
          type: ["string", "null"]
        attendees:
          oneOf:
            - $ref: "#/components/schemas/SessionAttendees"
            - type: "null"
      required:
        - sessionNumber
        - title

    UpdateSessionBody:
      type: object
      properties:
        sessionNumber:
          type: integer
        title:
          type: string
        playedAt:
          type: ["string", "null"]
          format: date-time
        rawNotesMd:
          type: ["string", "null"]
        recapMd:
          type: ["string", "null"]
        attendees:
          oneOf:
            - $ref: "#/components/schemas/SessionAttendees"
            - type: "null"
        expectedVersion:
          type: integer
          description: Optimistic concurrency check. If provided, the server rejects the update with 409 when the current version does not match.

    ConflictError:
      type: object
      properties:
        error:
          type: string
        serverSession:
